name: First workflow
on: push
jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        -  name: checkout-repo
           uses: actions/checkout@v6

        -  name: Welcome message
           run: echo "my first github workflow command"
    
        -  name: List files 
           run: ls

        -  name: Show index.html
           run: cat index.html

        -   name: Install cowsay
            run: sudo apt install cowsay -y

        -  name: Create a dragon
           run: cowsay -f dragon "I am a dragon and breath fire." >> dragon.txt
           
        -  name: Show dragon
           run: cat dragon.txt

           