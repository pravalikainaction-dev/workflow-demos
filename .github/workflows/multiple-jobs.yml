name: Multiple jobs
on: push
jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
        -  name: install cowsay
           run: sudo apt install coswsay -y

        -  name: Generate Dragon
           run: cowsay -f dragon "I am a dragon and breath fire." >> dragon.txt
      
        -  name: Send the dragon
           uses: actions/upload-artifact@v4
           with:
            name: dragon-file
            path: dragon.txt

        -  name: sleep for 30 sec
           run: sleep 30
        -  name: call the dragon
           uses: actions/download-artifact@v8
           with:
            name: dragon-file

        -  name: Show index.html
           run: cat index.html

    job2:
        needs: job1
        runs-on: unbuntu latest
        steps:
        -  name: Show dragon
           run: ls dragon.txt   

    job3:
        needs: job2
        runs-on: unbuntu latest
        steps:
         
         -  name: call the dragon
            uses: actions/download-artifact@v8
            with:
             name: dragon-file

         -  name: Show dragon
            run: ls dragon.txt
      